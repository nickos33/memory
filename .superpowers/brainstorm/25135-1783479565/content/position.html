<h2>悬浮面板 — 位置</h2>
<p class="subtitle">面板默认放在桌面哪个位置？</p>

<div class="options">
  <div class="option" data-choice="top-right" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>右上角</h3>
      <p>传统位置，靠近菜单栏，不遮挡桌面图标区域。大多数桌面小组件的默认位置。</p>
    </div>
  </div>
  <div class="option" data-choice="top-left" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>左上角</h3>
      <p>左侧布局，适合右撇子用户查看。不遮挡 Finder 侧边栏。</p>
    </div>
  </div>
  <div class="option" data-choice="bottom-right" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>右下角</h3>
      <p>靠近 Dock，直觉上适合频繁查看。类似聊天窗口位置。</p>
    </div>
  </div>
  <div class="option" data-choice="center-top" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>顶部居中</h3>
      <p>像横幅一样居中悬浮在屏幕顶部，最醒目。适合需要频繁关注的场景。</p>
    </div>
  </div>
</div>
