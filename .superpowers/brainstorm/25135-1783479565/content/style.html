<h2>悬浮面板 — 视觉风格</h2>
<p class="subtitle">面板的外观风格？</p>

<div class="options">
  <div class="option" data-choice="glass" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>毛玻璃（与主应用一致）</h3>
      <p>半透明白色背景 + 模糊效果，与纪念日主应用的毛玻璃主题统一。圆角卡片，轻盈通透。</p>
    </div>
  </div>
  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>深色迷你卡片</h3>
      <p>深色半透明背景，文字对比度更高，适合浅色桌面壁纸。类似 macOS 通知中心小组件。</p>
    </div>
  </div>
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>极简文字</h3>
      <p>几乎无背景，纯文字 + 日期数字突出，悬浮在桌面上像日历标记。占用空间最小。</p>
    </div>
  </div>
</div>
