<h2>悬浮面板 — 显示数量</h2>
<p class="subtitle">面板上显示几个纪念日？</p>

<div class="options">
  <div class="option" data-choice="3" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>显示 3 个</h3>
      <p>最简洁，只显示最近 3 个即将到来的纪念日，占用桌面空间最小</p>
    </div>
  </div>
  <div class="option" data-choice="5" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>显示 5 个</h3>
      <p>平衡方案，显示最近 5 个，给用户更全面的时间感知</p>
    </div>
  </div>
  <div class="option" data-choice="all" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>全部显示（可滚动）</h3>
      <p>面板内容可上下滚动，显示所有纪念日。面板高度固定，滚动查看更多</p>
    </div>
  </div>
</div>
