<h2>悬浮面板 — 交互行为</h2>
<p class="subtitle">用户如何与面板交互？</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="click-app" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>点击打开主应用</h3>
      <p>点击面板上的纪念日或标题，打开纪念日主窗口</p>
    </div>
  </div>
  <div class="option" data-choice="scroll" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>滚轮滑动查看更多</h3>
      <p>面板内支持鼠标滚轮上下滑动，查看所有纪念日</p>
    </div>
  </div>
  <div class="option" data-choice="drag" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>可拖拽移动位置</h3>
      <p>用户可以按住面板拖拽到桌面的任意位置</p>
    </div>
  </div>
  <div class="option" data-choice="right-click" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>右键菜单</h3>
      <p>右键点击面板弹出菜单：打开主窗口 / 隐藏面板 / 退出</p>
    </div>
  </div>
  <div class="option" data-choice="resize" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>可调整大小</h3>
      <p>右下角拖拽调整面板宽高</p>
    </div>
  </div>
</div>
