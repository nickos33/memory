<h2>卡片动效程度</h2>
<p class="subtitle">动画是双刃剑 — 太少生硬，太多烦人</p>

<div class="section">
  <div class="options">
    <div class="option" data-choice="anim-minimal" onclick="toggleSelect(this)">
      <div class="letter">A</div>
      <div class="content">
        <h3>轻量微动效（推荐）</h3>
        <p>卡片 hover 微微上浮(2px) + 阴影加深 + 入场滑入(fade+slide, 0.2s)。快、不拖沓、精致感</p>
      </div>
    </div>
    <div class="option" data-choice="anim-rich" onclick="toggleSelect(this)">
      <div class="letter">B</div>
      <div class="content">
        <h3>丰富的过渡动画</h3>
        <p>以上全部 + 删除时卡片收起 + 新增时展开 + 置顶切换平滑移动 + 毛玻璃模糊过渡</p>
      </div>
    </div>
    <div class="option" data-choice="anim-none" onclick="toggleSelect(this)">
      <div class="letter">C</div>
      <div class="content">
        <h3>零动效</h3>
        <p>纯静态，所有变化瞬间完成。最省资源，但缺乏质感</p>
      </div>
    </div>
  </div>
</div>
